<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ZGBIRD.com · 域名出售中</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "PingFang SC", "Noto Sans", "Microsoft YaHei", sans-serif;
    background-color: #0b0d17;
    color: #e6e6e6;
    text-align: center;
  }
  .container {
    max-width: 720px;
    margin: 8% auto;
    padding: 0 20px;
  }
  picture, img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 36px;
    margin-top: 28px;
    color: #00aaff;
    letter-spacing: 1px;
  }
  h2 {
    font-size: 20px;
    font-weight: 400;
    color: #8ec9ff;
    margin: 10px 0 15px 0;
  }
  .for-sale {
    color: #ffcc00;
    font-weight: bold;
    font-size: 20px;
    margin: 20px 0;
  }
  p {
    font-size: 16px;
    line-height: 1.8;
    color: #ccc;
    margin: 10px 0;
  }
  a {
    color: #00aaff;
    text-decoration: none;
    font-weight: 500;
  }
  .divider {
    width: 60px;
    height: 2px;
    background: #00aaff;
    margin: 20px auto;
  }
  footer {
    font-size: 12px;
    color: #666;
    margin-top: 40px;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- ✅ 图片部分（优先加载 AVIF） -->
    <picture>
      <source srcset="photo-1504384308090-c894fdcc538d.avif" type="image/avif">
      <img src="photo-1504384308090-c894fdcc538d.jpg" alt="科技背景图" loading="lazy">
    </picture>

    <h1>ZGBIRD.com</h1>
    <h2>智光鸟 · Zhi Guang Bird</h2>
    <div class="divider"></div>

    <!-- 域名出售信息 -->
    <p class="for-sale">🔥 域名出售中 · Domain For Sale</p>

    <p>“ZGBIRD · 智光鸟”寓意灵感与科技的交汇，象征创新与智能。<br>
       此域名适用于科技、创新、品牌类项目。<br>
       <strong>欢迎有意者联系洽谈购买。</strong></p>

    <p>联系邮箱：<a href="mailto:xu456xu@gmail.com">xu456xu@gmail.com</a></p>

    <footer>
      Background image by <a href="https://unsplash.com/photos/photo-1504384308090-c894fdcc538d" target="_blank">Taylor Vick</a> on Unsplash.
    </footer>
  </div>
  <style>
@keyframes pulse {
  0% { box-shadow: 0 0 10px var(--neon-color, #00ffee55); }
  50% { box-shadow: 0 0 25px var(--neon-color, #00ffeeaa); }
  100% { box-shadow: 0 0 10px var(--neon-color, #00ffee55); }
}

@keyframes flicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
  20%, 22%, 24%, 55% { opacity: 0.3; }
}

.cyber-counter {
  font-family: 'Courier New', monospace;
  background: radial-gradient(circle at center, #00111a 0%, #000000 100%);
  color: var(--neon-color, #00ffee);
  font-size: 18px;
  text-align: center;
  padding: 20px;
  border: 1px solid var(--neon-color, #00ffee);
  border-radius: 8px;
  width: fit-content;
  margin: 40px auto;
  animation: pulse 3s infinite;
  transition: color 1s, border-color 1s, box-shadow 1s;
}

.cyber-num {
  color: var(--neon-color, #00ffcc);
  text-shadow: 0 0 5px var(--neon-color, #00ffee), 0 0 10px var(--neon-color, #00ffee);
  animation: flicker 2s infinite;
  font-size: 22px;
  transition: color 1s, text-shadow 1s;
}

.cyber-sub {
  margin-top: 8px;
  font-size: 14px;
  color: #00cccc;
  opacity: 0.8;
}
</style>

<div class="cyber-counter" id="counterBox">
  <div>> 系统状态：运行中_</div>
  <div style="margin-top:10px;">
    全局访问计数 >> <span id="num" class="cyber-num">00000</span>
  </div>
  <div class="cyber-sub">
    您的到访已被系统记录。感谢连接至此节点。
  </div>
</div>

<script>
// 初始化计数（只需第一次手动执行一次）
// fetch('https://api.countapi.xyz/set/hanlure.com/num?value=9876');

// 每次访问 +1 并显示
fetch('https://api.countapi.xyz/hit/hanlure.com/num')
  .then(r => r.json())
  .then(r => {
    const num = r.value.toString().padStart(5, '0');
    document.getElementById('num').innerText = num;
  });

// 🌈 定义随机颜色函数
function randomNeonColor() {
  const colors = ['#00ffee', '#00ff99', '#33ccff', '#ff33cc', '#cc66ff', '#ff6666', '#66ffcc'];
  return colors[Math.floor(Math.random() * colors.length)];
}

// 🌈 每3秒切换一次颜色
setInterval(() => {
  const color = randomNeonColor();
  document.documentElement.style.setProperty('--neon-color', color);
}, 3000);
</script>
</body>
</html>
